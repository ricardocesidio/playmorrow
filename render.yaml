services:
  - type: web
    name: playmorrow-api
    env: node
    nodeVersion: 22
    buildCommand: pnpm exec turbo run build --filter=@playmorrow/api^...
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPLOADS_DIR
        value: /var/data/uploads

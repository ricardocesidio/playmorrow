name: CI

# IMPORTANT: After this workflow is green, enable branch protection on GitHub:
# Settings → Branches → main → Require status checks to pass before merging
# Select: "quality", "backend", "e2e"
#
# Future: add a11y (axe-core or Lighthouse CI) and coverage jobs here (see audit list).

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  backend:
    name: Backend tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: playmorrow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Use TEST_DATABASE_URL so vitest.setup.ts override + guard is exercised
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/playmorrow_test?schema=public
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/playmorrow_test?schema=public
      JWT_SECRET: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build api + workspace deps (generates Prisma client)
        run: pnpm exec turbo run build --filter=@playmorrow/api...
      - name: Apply migrations
        run: pnpm --filter @playmorrow/database db:deploy
      - name: Run backend tests
        run: pnpm --filter @playmorrow/api test

  e2e:
    name: E2E (Playwright desktop + mobile)
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web + workspace deps
        run: pnpm exec turbo run build --filter=@playmorrow/web...
      - name: Install Playwright browser
        run: pnpm --filter @playmorrow/web exec playwright install --with-deps chromium
      - name: Run E2E (desktop + mobile)
        run: pnpm --filter @playmorrow/web test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 7
      # TODO (audit 2): Expand e2e for new a11y (tabs, ARIA from B6/B7), run full suite locally with PLAYWRIGHT_DEV=1. Add coverage report. See docs/audit-fixes-summary.md.
      # A11y: placeholder for Lighthouse CI or axe (run on key pages like /games, /feed)
      # - name: A11y check
      #   run: npx @lhci/cli autorun --upload.target=temporary-public-storage || echo "A11y check placeholder"

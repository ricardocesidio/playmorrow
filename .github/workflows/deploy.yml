name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web app
        run: pnpm exec turbo run build --filter=@playmorrow/web...
      - name: Pull Vercel env
        run: npx vercel pull --cwd apps/web --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build for Vercel
        run: npx vercel build --cwd apps/web --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --cwd apps/web --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
